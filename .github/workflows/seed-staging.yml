name: Seed Staging

# Manual-trigger only. Re-runs the CSV seeds inside the CI runner,
# fetching images from their original URLs (framerusercontent.com etc.)
# and uploading them to staging's R2 bucket, then snapshots the
# ephemeral local D1 to the remote staging D1.
#
# Use when: you've added rows to scripts/seed/*.csv and want staging
# to reflect them, OR you want to reset staging's content to match
# the CSVs (this fully replaces the content tables on staging).
on:
  workflow_dispatch:

concurrency:
  group: seed-staging
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate STAGING_R2_BUCKET format
        # Fail fast with a clear error if the secret isn't a valid S3/R2
        # bucket name. Previously the seed got partway through, started
        # uploading, and the AWS SDK rejected it with a stack-trace-y
        # `InvalidBucketName` — surfacing the actual offending value
        # here is much easier to act on.
        # R2 bucket names follow S3 rules: 3-63 chars, lowercase
        # letters/digits/dots/hyphens, must start+end with letter or digit.
        # (R2 bucket names aren't sensitive — they're effectively public in
        # S3 URLs — so it's fine to echo the value back on failure.)
        env:
          R2_BUCKET: ${{ secrets.STAGING_R2_BUCKET }}
        run: |
          if [ -z "$R2_BUCKET" ]; then
            echo "::error::STAGING_R2_BUCKET secret is unset or empty"
            exit 1
          fi
          if [[ ! "$R2_BUCKET" =~ ^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$ ]]; then
            echo "::error::STAGING_R2_BUCKET ('$R2_BUCKET') fails S3 bucket name validation."
            echo "Rules: 3-63 chars, lowercase letters/digits/dots/hyphens, must start+end with letter or digit."
            exit 1
          fi
          echo "✓ STAGING_R2_BUCKET passes S3 name format check (length=${#R2_BUCKET})"

      - name: Apply schema to ephemeral local D1
        # `--local` writes to .wrangler/state/v3/d1 in this runner.
        # No remote calls and no CF creds needed for this step.
        run: pnpm db:migrate:local

      - name: Seed local D1 + upload images to staging R2
        # `pnpm db:seed:local` runs scripts/db-fresh.ts, which uses
        # getPlatformProxy() to bind the runner-local D1 and loads .env
        # via `dotenv/config`. We pass the R2 env vars directly so
        # payload.config.ts's conditional s3Storage plugin activates
        # against the *staging* bucket — images get fetched from their
        # source URLs (Framer etc.) and PUT to that bucket. Media rows
        # written to the ephemeral local D1 reference the same
        # filenames Payload generated for those uploads.
        env:
          R2_BUCKET: ${{ secrets.STAGING_R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}
        run: pnpm db:seed:local

      - name: Snapshot ephemeral local D1 → remote staging D1
        # Uses our existing seed-remote.ts: exports content tables
        # from the runner-local D1 and applies them to the remote
        # staging D1 via `wrangler d1 execute --remote --env staging`.
        # PRAGMA foreign_keys=OFF + DELETE-then-INSERT makes the
        # apply idempotent on a non-empty remote DB.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm db:seed:staging
