name: Deploy Production

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare env types
        run: pnpm exec wrangler types --env-interface CloudflareEnv ./cloudflare-env.d.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: OpenNext build
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_DEPLOY_ENV: production
          NEXT_PUBLIC_MEDIA_BASE_URL: ${{ secrets.PRODUCTION_NEXT_PUBLIC_MEDIA_BASE_URL }}
          STRAPI_URL: ${{ secrets.PRODUCTION_STRAPI_URL }}
          STRAPI_API_TOKEN: ${{ secrets.PRODUCTION_STRAPI_API_TOKEN }}
          STRAPI_PREVIEW: ${{ secrets.PRODUCTION_STRAPI_PREVIEW }}
          NEON_DATABASE_URL: ${{ secrets.PRODUCTION_NEON_DATABASE_URL }}

      - name: Upload secrets to Cloudflare Workers (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRAPI_URL: ${{ secrets.PRODUCTION_STRAPI_URL }}
          STRAPI_API_TOKEN: ${{ secrets.PRODUCTION_STRAPI_API_TOKEN }}
          STRAPI_PREVIEW: ${{ secrets.PRODUCTION_STRAPI_PREVIEW }}
          NEON_DATABASE_URL: ${{ secrets.PRODUCTION_NEON_DATABASE_URL }}
        run: |
          jq -n \
            --arg STRAPI_URL "$STRAPI_URL" \
            --arg STRAPI_API_TOKEN "$STRAPI_API_TOKEN" \
            --arg STRAPI_PREVIEW "$STRAPI_PREVIEW" \
            --arg NEON_DATABASE_URL "$NEON_DATABASE_URL" \
            '{
              STRAPI_URL: $STRAPI_URL,
              STRAPI_API_TOKEN: $STRAPI_API_TOKEN,
              STRAPI_PREVIEW: $STRAPI_PREVIEW,
              NEON_DATABASE_URL: $NEON_DATABASE_URL
            }' \
          | pnpm exec wrangler secret bulk --env production

      - name: Ensure production contact-webhook queue exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # The Worker binds this queue as a producer; deploy fails if it is
          # absent. Create it once, idempotently — skip if it already exists.
          if pnpm exec wrangler queues list | grep -q 'epyc-contact-webhook-production'; then
            echo "Queue epyc-contact-webhook-production already exists — skipping."
          else
            pnpm exec wrangler queues create epyc-contact-webhook-production
          fi

      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

      - name: Deploy contact-webhook consumer (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production --config workers/contact-webhook/wrangler.jsonc

      - name: Set contact-webhook secret (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTACT_WEBHOOK_URL: ${{ secrets.PRODUCTION_CONTACT_WEBHOOK_URL }}
        run: |
          if [ -z "$CONTACT_WEBHOOK_URL" ]; then
            echo "::error::PRODUCTION_CONTACT_WEBHOOK_URL is unset — add it in the repo's GitHub Actions secrets."
            exit 1
          fi
          printf '%s' "$CONTACT_WEBHOOK_URL" \
            | pnpm exec wrangler secret put CONTACT_WEBHOOK_URL \
                --env production --config workers/contact-webhook/wrangler.jsonc
