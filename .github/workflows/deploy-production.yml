name: Deploy Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare env types
        run: pnpm exec wrangler types --env-interface CloudflareEnv ./cloudflare-env.d.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Regenerate Payload importMap
        # payload.config.ts only registers the s3Storage plugin when
        # R2_BUCKET && R2_ENDPOINT are set, and the plugin contributes
        # S3ClientUploadHandler to the import map. Force truthy values so
        # the regenerated map matches the committed copy (which is
        # produced locally with real R2 env vars). The values aren't
        # actually used — generateImportMap walks the static config tree.
        run: pnpm generate:importmap
        env:
          R2_BUCKET: importmap-stub
          R2_ENDPOINT: https://importmap-stub.invalid

      - name: Fail if importMap drifted from committed copy
        run: |
          git diff --exit-code app/\(payload\)/admin/importMap.js \
            || (echo "importMap.js is stale. Run 'pnpm generate:importmap' locally and commit the result." && exit 1)

      - name: Apply D1 schema migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply DB --remote --env production

      - name: OpenNext build
        run: pnpm exec opennextjs-cloudflare build
        env:
          # Payload's init reads PAYLOAD_SECRET at module load. Build-time
          # Next pre-rendering loads payload.config.ts, so it must be set.
          # R2_* are stubbed for the same reason as the importMap step:
          # forces the s3 plugin into the config consistently.
          PAYLOAD_SECRET: ${{ secrets.PRODUCTION_PAYLOAD_SECRET }}
          R2_BUCKET: build-stub
          R2_ENDPOINT: https://build-stub.invalid

      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
          secrets: |
            PAYLOAD_SECRET
            R2_BUCKET
            R2_ENDPOINT
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
        env:
          # All repo-level secrets. Per-env values use STAGING_ / PRODUCTION_
          # prefix; values shared across envs (R2 endpoint and access keys,
          # since both envs target the same Cloudflare account) are unprefixed.
          PAYLOAD_SECRET: ${{ secrets.PRODUCTION_PAYLOAD_SECRET }}
          R2_BUCKET: ${{ secrets.PRODUCTION_R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
