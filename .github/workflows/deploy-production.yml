name: Deploy Production

# Push-on-master trigger disabled — enable by uncommenting once production
# Cloudflare Workers secrets (STRAPI_URL, STRAPI_API_TOKEN, CONTACT_WEBHOOK_URL)
# are set in the GitHub Actions production environment.
on:
  # push:
  #   branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare env types
        run: pnpm exec wrangler types --env-interface CloudflareEnv ./cloudflare-env.d.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: OpenNext build
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_DEPLOY_ENV: production
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}

      - name: Upload secrets to Cloudflare Workers (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
        run: |
          jq -n \
            --arg STRAPI_URL "$STRAPI_URL" \
            --arg STRAPI_API_TOKEN "$STRAPI_API_TOKEN" \
            '{
              STRAPI_URL: $STRAPI_URL,
              STRAPI_API_TOKEN: $STRAPI_API_TOKEN
            }' \
          | pnpm exec wrangler secret bulk --env production

      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

      - name: Deploy contact-webhook consumer (production)
        # Separate Worker that drains CONTACT_QUEUE and POSTs each contact
        # submission to the webhook. Requires the Cloudflare queues
        # epyc-contact-webhook-production + -dlq to exist already
        # (`wrangler queues create ...`) — this step fails until they do.
        # The CONTACT_WEBHOOK_URL secret is applied by the next step.
        # Runs after the main deploy so a missing queue can't block the site.
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production --config workers/contact-webhook/wrangler.jsonc

      - name: Set contact-webhook secret (production)
        # CONTACT_WEBHOOK_URL — the endpoint the consumer POSTs submissions to.
        # `secret put` needs the Worker to exist, so this runs after the deploy
        # above. Re-applied every run to stay in sync with the GitHub secret.
        # Requires the PRODUCTION_CONTACT_WEBHOOK_URL repo Actions secret.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTACT_WEBHOOK_URL: ${{ secrets.PRODUCTION_CONTACT_WEBHOOK_URL }}
        run: |
          if [ -z "$CONTACT_WEBHOOK_URL" ]; then
            echo "::error::PRODUCTION_CONTACT_WEBHOOK_URL is unset — add it in the repo's GitHub Actions secrets."
            exit 1
          fi
          printf '%s' "$CONTACT_WEBHOOK_URL" \
            | pnpm exec wrangler secret put CONTACT_WEBHOOK_URL \
                --env production --config workers/contact-webhook/wrangler.jsonc
