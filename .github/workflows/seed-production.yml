name: Seed Production

# Manual-trigger only. Same shape as seed-staging.yml but targets the
# production R2 bucket + production D1. Run after a production deploy
# (or whenever you want production content reset to match the CSVs).
#
# Destructive on production content tables — wipes blogs / projects /
# gallery / media / authors before re-inserting. Safe to re-run.
on:
  workflow_dispatch:

concurrency:
  group: seed-production
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate PRODUCTION_R2_BUCKET format
        # Same fail-fast bucket-name regex as seed-staging.yml — see
        # that file for the rationale.
        env:
          R2_BUCKET: ${{ secrets.PRODUCTION_R2_BUCKET }}
        run: |
          if [ -z "$R2_BUCKET" ]; then
            echo "::error::PRODUCTION_R2_BUCKET secret is unset or empty"
            exit 1
          fi
          if [[ ! "$R2_BUCKET" =~ ^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$ ]]; then
            echo "::error::PRODUCTION_R2_BUCKET ('$R2_BUCKET') fails S3 bucket name validation."
            echo "Rules: 3-63 chars, lowercase letters/digits/dots/hyphens, must start+end with letter or digit."
            exit 1
          fi
          echo "✓ PRODUCTION_R2_BUCKET passes S3 name format check (length=${#R2_BUCKET})"

      - name: Apply schema to ephemeral local D1
        run: pnpm db:migrate:local

      - name: Seed local D1 + upload images to production R2
        env:
          R2_BUCKET: ${{ secrets.PRODUCTION_R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PAYLOAD_SECRET: ${{ secrets.PRODUCTION_PAYLOAD_SECRET }}
        run: pnpm db:seed:local

      - name: Snapshot ephemeral local D1 → remote production D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm db:seed:production
