name: CI

on:
  pull_request:
    branches: [develop, master]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Typecheck contact-webhook worker
        # The consumer Worker is excluded from the root tsconfig (different
        # libs), so it has its own project — check it explicitly.
        run: pnpm exec tsc --noEmit -p workers/contact-webhook/tsconfig.json

      - name: Lint
        run: pnpm lint

      - name: OpenNext build
        run: pnpm exec opennextjs-cloudflare build
