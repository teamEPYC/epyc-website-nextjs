name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare env types
        run: pnpm exec wrangler types --env-interface CloudflareEnv ./cloudflare-env.d.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Regenerate Payload importMap
        # payload.config.ts only registers the s3Storage plugin when
        # R2_BUCKET && R2_ENDPOINT are set, and the plugin contributes
        # S3ClientUploadHandler to the import map. Force truthy values so
        # the regenerated map matches the committed copy (which is
        # produced locally with real R2 env vars). The values aren't
        # actually used — generateImportMap walks the static config tree.
        run: pnpm generate:importmap
        env:
          R2_BUCKET: importmap-stub
          R2_ENDPOINT: https://importmap-stub.invalid

      - name: Fail if importMap drifted from committed copy
        run: |
          git diff --exit-code app/\(payload\)/admin/importMap.js \
            || (echo "importMap.js is stale. Run 'pnpm generate:importmap' locally and commit the result." && exit 1)

      - name: Apply D1 schema migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply DB --remote --env staging

      - name: OpenNext build
        run: pnpm exec opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          secrets: |
            PAYLOAD_SECRET
            R2_BUCKET
            R2_ENDPOINT
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
        env:
          # PAYLOAD_SECRET and R2_BUCKET come from the `staging` Environment
          # (Settings → Environments → staging). The other R2_* values are
          # repo-level secrets (shared across envs since they point at the
          # same Cloudflare account).
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
