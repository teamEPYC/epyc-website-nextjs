name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare env types
        run: pnpm exec wrangler types --env-interface CloudflareEnv ./cloudflare-env.d.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Regenerate Payload importMap
        # payload.config.ts only registers the s3Storage plugin when
        # R2_BUCKET && R2_ENDPOINT are set, and the plugin contributes
        # S3ClientUploadHandler to the import map. Force truthy values so
        # the regenerated map matches the committed copy (which is
        # produced locally with real R2 env vars). The values aren't
        # actually used — generateImportMap walks the static config tree.
        run: pnpm generate:importmap
        env:
          R2_BUCKET: importmap-stub
          R2_ENDPOINT: https://importmap-stub.invalid

      - name: Fail if importMap drifted from committed copy
        run: |
          git diff --exit-code app/\(payload\)/admin/importMap.js \
            || (echo "importMap.js is stale. Run 'pnpm generate:importmap' locally and commit the result." && exit 1)

      - name: Apply D1 schema migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply DB --remote --env staging

      - name: OpenNext build
        run: pnpm exec opennextjs-cloudflare build
        env:
          # Selects the per-environment site origin in data/site.ts. Next.js
          # inlines NEXT_PUBLIC_* at build time, freezing the staging origin
          # into the bundle for metadataBase / OG image / canonical URLs.
          NEXT_PUBLIC_DEPLOY_ENV: staging
          # Payload's init reads PAYLOAD_SECRET at module load. Build-time
          # Next pre-rendering loads payload.config.ts, so it must be set.
          # R2_* are stubbed for the same reason as the importMap step:
          # forces the s3 plugin into the config consistently.
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}
          R2_BUCKET: build-stub
          R2_ENDPOINT: https://build-stub.invalid

      - name: Upload secrets to Cloudflare Workers (staging)
        # wrangler-action's `secrets:` input invokes `wrangler secret bulk`
        # without --env, so wrangler 4.x targets the top-level worker
        # (`epyc-website`, our local-dev name) instead of the staging worker
        # and fails authentication. Upload them ourselves with --env staging
        # so the bulk call hits epyc-website-staging directly. Values are
        # passed as positional jq --arg so quoting/newlines in secret values
        # are safe. Per-env values use STAGING_ / PRODUCTION_ prefix; values
        # shared across envs (R2 endpoint and access keys, since both envs
        # target the same Cloudflare account) are unprefixed.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}
          R2_BUCKET: ${{ secrets.STAGING_R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          jq -n \
            --arg PAYLOAD_SECRET "$PAYLOAD_SECRET" \
            --arg R2_BUCKET "$R2_BUCKET" \
            --arg R2_ENDPOINT "$R2_ENDPOINT" \
            --arg R2_ACCESS_KEY_ID "$R2_ACCESS_KEY_ID" \
            --arg R2_SECRET_ACCESS_KEY "$R2_SECRET_ACCESS_KEY" \
            '{
              PAYLOAD_SECRET: $PAYLOAD_SECRET,
              R2_BUCKET: $R2_BUCKET,
              R2_ENDPOINT: $R2_ENDPOINT,
              R2_ACCESS_KEY_ID: $R2_ACCESS_KEY_ID,
              R2_SECRET_ACCESS_KEY: $R2_SECRET_ACCESS_KEY
            }' \
          | pnpm exec wrangler secret bulk --env staging

      - name: Deploy to Cloudflare Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
