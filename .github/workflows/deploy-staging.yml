name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare env types
        run: pnpm exec wrangler types --env-interface CloudflareEnv ./cloudflare-env.d.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: OpenNext build
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_DEPLOY_ENV: staging
          NEXT_PUBLIC_MEDIA_BASE_URL: https://website-media.epyc.in
          STRAPI_URL: ${{ secrets.STAGING_STRAPI_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STAGING_STRAPI_API_TOKEN }}
          NEON_DATABASE_URL: ${{ secrets.STAGING_NEON_DATABASE_URL }}

      - name: Upload secrets to Cloudflare Workers (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRAPI_URL: ${{ secrets.STAGING_STRAPI_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STAGING_STRAPI_API_TOKEN }}
          NEON_DATABASE_URL: ${{ secrets.STAGING_NEON_DATABASE_URL }}
        run: |
          jq -n \
            --arg STRAPI_URL "$STRAPI_URL" \
            --arg STRAPI_API_TOKEN "$STRAPI_API_TOKEN" \
            --arg NEON_DATABASE_URL "$NEON_DATABASE_URL" \
            '{
              STRAPI_URL: $STRAPI_URL,
              STRAPI_API_TOKEN: $STRAPI_API_TOKEN,
              NEON_DATABASE_URL: $NEON_DATABASE_URL
            }' \
          | pnpm exec wrangler secret bulk --env staging

      - name: Deploy to Cloudflare Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

      - name: Deploy contact-webhook consumer (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging --config workers/contact-webhook/wrangler.jsonc

      - name: Set contact-webhook secret (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTACT_WEBHOOK_URL: ${{ secrets.STAGING_CONTACT_WEBHOOK_URL }}
        run: |
          if [ -z "$CONTACT_WEBHOOK_URL" ]; then
            echo "::error::STAGING_CONTACT_WEBHOOK_URL is unset — add it in the repo's GitHub Actions secrets."
            exit 1
          fi
          printf '%s' "$CONTACT_WEBHOOK_URL" \
            | pnpm exec wrangler secret put CONTACT_WEBHOOK_URL \
                --env staging --config workers/contact-webhook/wrangler.jsonc
